# Default values for common-chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: nginx
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secretes for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: "app"

#This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/ 
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: true
  className: "nginx"
  annotations: 
    cert-manager.io/cluster-issuer: ca-issuer
  hosts:
    - host: test-app.test.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: 
   - secretName: test-app-tls
     hosts:
       - test-app.test.local

resources: 
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

#This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max          # допустимо: Max | Min | Disabled
      policies:
        - type: Percent          # не более +100% за 60 сек
          value: 100
          periodSeconds: 60
        - type: Pods             # и не более +4 пода за 60 сек
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 30
      selectPolicy: Max          # для жёсткого ограничения выбирай Min
      policies:
        - type: Percent          # не более -10% за 60 сек
          value: 10
          periodSeconds: 60



# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}


vault_secret:
  enabled: true
  name: app-secret                 # имя k8s Secret, который получит VSO
  secretFullPath: app/service/app1  # путь в Vault: <ns>/service/<app>
  type: kv-v1                       # у меня сейчас kv-v1
  role: ns-scoped-read              # универсальная роль в vault для всех ns
  # audiences:
  #   - "https://kubernetes.default.svc"



topologySpread:
  enabled: true
  constraints:
    - topologyKey: "kubernetes.io/hostname"  # по серверам
      maxSkew: 2
      whenUnsatisfiable: "ScheduleAnyway" # или "DoNotSchedule"


updateStrategy:
  enabled: true
  type: RollingUpdate           # или Recreate
  rollingUpdate:
    maxSurge: 25%               # число или проценты; напр. 1 или "25%"
    maxUnavailable: 0           # число или проценты; 0 = без даунтайма по репликам
  minReadySeconds: 10           # сколько pod должен быть Ready перед следующим шагом
  revisionHistoryLimit: 10      # сколько старых ReplicaSet хранить
  progressDeadlineSeconds: 600  # дедлайн на прогресс выката

pdb:
  enabled: true
  # Выбери ОДИН из параметров ниже:
  minAvailable: 1
  #maxUnavailable: 1
  #Замечание: при replicaCount: 1 и minAvailable: 1 drain ноды будет блокироваться — это ожидаемое поведение. Если это не нужно, ставьте maxUnavailable: 1 или увеличьте число реплик

keda:
  enabled: true
  # имя цели по умолчанию = fullname релиза, но можно переопределить
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ""   # пусто => {{ include "common-chart.fullname" . }}
  # как часто KEDA опрашивает метрику и сколько держит реплики после падения нагрузки
  pollingInterval: 15        # сек, дефолт KEDA ~30
  cooldownPeriod: 30         # сек, дефолт KEDA ~300
  # границы масштаба (если не заданы, KEDA не создаёт HPA-ограничения)
  minReplicaCount: 1
  maxReplicaCount: 5
  # вернуть ли реплики к исходному числу при отключении триггера
  restoreToOriginalReplicaCount: false
  # fallback — сколько держать реплик, если источник метрик «упал»
  fallback:
    # включается автоматически, если задать поля ниже
    # failureThreshold: 3     # после скольких «ошибочных» циклов метрик включить fallback
    # replicas: 2             # во сколько реплик перейти на fallback
  # продвинутые настройки (пробрасываются в HPA, который создаёт KEDA)
  advanced:
    # стратегия при нескольких триггерах: max | min | average
    scalingStrategy:
      multipleScalersCalculation: max
    # полностью совместимо с autoscaling/v2 .spec.behavior (как у HPA)
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          selectPolicy: Max
          policies:
            - type: Percent
              value: 100
              periodSeconds: 60
            - type: Pods
              value: 4
              periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 20
          selectPolicy: Max
          policies:
            - type: Percent
              value: 10
              periodSeconds: 60
  # список триггеров (можно несколько). Ниже — пример для Prometheus/VictoriaMetrics
  triggers:
    - type: prometheus
      # name: "ingress-requests"   # опционально — имя триггера
      metadata:
        serverAddress: "http://vmsingle-vmks-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:8428"
        metricName: "ingress_requests"
        query: |-
          sum(
            increase(
              nginx_ingress_controller_requests{ingress="app"}[2m]
            )
          )
        threshold: "100"            # строки обязательны для большинства триггеров
        # activationThreshold: "10"  # опционально — «включаться» только после X
        # ignoreNullValues: "true"   # для некоторых скейлеров
        unsafeSsl: "true"          # если Prometheus с self-signed
      # authenticationRef:
      #   name: keda-prometheus-auth            # TriggerAuthentication или ClusterTriggerAuthentication
      #   kind: TriggerAuthentication

    # 2) CPU > 60%
    - type: cpu
      name: cpu
      metricType: Utilization
      metadata:
        value: "60"              # целевая загрузка CPU в %
        # containerName: common-chart  # опционально, если надо таргетить конкретный контейнер