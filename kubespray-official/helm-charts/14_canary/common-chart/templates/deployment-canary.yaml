{{- if .Values.canary.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common-chart.fullname" . }}-canary
  labels:
    {{- include "common-chart.labels" . | nindent 4 }}
    rollout: canary
spec:
  replicas: {{ .Values.canary.replicaCount | default 1 }}
  {{- if .Values.updateStrategy.enabled }}
  strategy:
    type: {{ .Values.updateStrategy.type | default "RollingUpdate" }}
    {{- if ne (.Values.updateStrategy.type | default "RollingUpdate") "Recreate" }}
    rollingUpdate:
      maxSurge: {{ .Values.updateStrategy.rollingUpdate.maxSurge | default "25%" }}
      maxUnavailable: {{ .Values.updateStrategy.rollingUpdate.maxUnavailable | default 0 }}
    {{- end }}
  minReadySeconds: {{ .Values.updateStrategy.minReadySeconds | default 0 }}
  revisionHistoryLimit: {{ .Values.updateStrategy.revisionHistoryLimit | default 10 }}
  progressDeadlineSeconds: {{ .Values.updateStrategy.progressDeadlineSeconds | default 600 }}
  {{- end }}

  selector:
    matchLabels:
      {{- include "common-chart.selectorLabels" . | nindent 6 }}
      track: canary
  template:
    metadata:
      annotations:
        {{- if and .Values.vault_secret.enabled .Values.vault_secret.name }}
        secret.reloader.stakater.com/reload: "{{ .Values.vault_secret.name }}"
        {{- end }}
        {{- with .Values.canary.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "common-chart.labels" . | nindent 8 }}
        track: canary
        {{- with .Values.canary.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "common-chart.serviceAccountName" . }}

      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- else }}
      securityContext: {}
      {{- end }}

      {{ $attach := default (dict) .Values.vault_secret.attach }}
      {{ $asEnv := default true  (get $attach "asEnv") }}
      {{ $asVol := default false (get $attach "asVolume") }}
      {{ $mountPath := default "/etc/app/secret" (get $attach "mountPath") }}

      {{- with .Values.initContainers }}
      initContainers:
        {{- range $i, $ic := . }}
        - name: {{ default (printf "%s-init-%d" $.Chart.Name $i) $ic.name }}
          {{- with $ic.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $ic.image }}
          image: "{{ .repository }}{{- if .tag }}:{{ .tag }}{{- end }}"
          {{- if .pullPolicy }}
          imagePullPolicy: {{ .pullPolicy }}
          {{- end }}
          {{- end }}
          {{- with $ic.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $ic.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $ic.workingDir }}
          workingDir: {{ . | quote }}
          {{- end }}
          {{- with $ic.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $ic.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $ic.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $ic.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $ic.extraContainerSpec }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- end }}
      {{- end }}

      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- $imgRepo := coalesce .Values.canary.image.repository .Values.image.repository }}
          {{- $imgTag  := coalesce .Values.canary.image.tag (.Values.image.tag | default .Chart.AppVersion) }}
          {{- $imgPol  := coalesce .Values.canary.image.pullPolicy .Values.image.pullPolicy }}
          image: "{{ $imgRepo }}:{{ $imgTag }}"
          imagePullPolicy: {{ $imgPol }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          {{- if and .Values.vault_secret.enabled $asEnv .Values.vault_secret.name }}
          envFrom:
            - secretRef:
                name: {{ .Values.vault_secret.name }}
          {{- end }}

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          {{- $needSecretVol := and .Values.vault_secret.enabled $asVol .Values.vault_secret.name }}
          {{- if or $needSecretVol .Values.volumeMounts }}
          volumeMounts:
            {{- if $needSecretVol }}
            - name: vault-secret
              mountPath: {{ $mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}

        {{- /* === Патчи для канареечных сайдкаров: image и resources === */}}
        {{- $imgPatchMap := dict -}}
        {{- $resPatchMap := dict -}}
        {{- range .Values.canary.sidecarsImages }}
          {{- if and .name .image }}
            {{- $_ := set $imgPatchMap .name .image }}
          {{- end }}
          {{- if and .name .resources }}
            {{- $_ := set $resPatchMap .name .resources }}
          {{- end }}
        {{- end }}

        {{- with .Values.sidecars }}
        {{- range $i, $sc := . }}
        {{- $scName := default (printf "%s-sidecar-%d" $.Chart.Name $i) $sc.name }}
        {{- $imgPatch := get $imgPatchMap $scName }}
        {{- $resPatch := get $resPatchMap $scName }}
        {{- $repo := (get (default (dict) $imgPatch) "repository") | default (get (default (dict) $sc.image) "repository") }}
        {{- $tag  := (get (default (dict) $imgPatch) "tag")        | default (get (default (dict) $sc.image) "tag") }}
        {{- $pol  := (get (default (dict) $imgPatch) "pullPolicy") | default (get (default (dict) $sc.image) "pullPolicy") }}
        {{- $res  := $resPatch | default $sc.resources }}

        - name: {{ $scName }}
          {{- with $sc.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ $repo }}{{- if $tag }}:{{ $tag }}{{- end }}"
          {{- if $pol }}
          imagePullPolicy: {{ $pol }}
          {{- end }}

          {{- with $sc.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.workingDir }}
          workingDir: {{ . | quote }}
          {{- end }}
          {{- with $sc.ports }}
          ports:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $res }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.terminationMessagePath }}
          terminationMessagePath: {{ . | quote }}
          {{- end }}
          {{- with $sc.terminationMessagePolicy }}
          terminationMessagePolicy: {{ . | quote }}
          {{- end }}
          {{- with $sc.extraContainerSpec }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- end }}
        {{- end }}

      {{- $needSecretVol := and .Values.vault_secret.enabled $asVol .Values.vault_secret.name }}
      {{- $cmVols := .Values.configMapVolumes | default (list) }}
      {{- if or $needSecretVol (or .Values.volumes (gt (len $cmVols) 0)) }}
      volumes:
        {{- if $needSecretVol }}
        - name: vault-secret
          secret:
            secretName: {{ .Values.vault_secret.name }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- range $v := $cmVols }}
        - name: {{ $v.volumeName | default (printf "cm-%s" $v.name) }}
          configMap:
            name: {{ printf "%s-%s" (include "common-chart.fullname" $) $v.name }}
            {{- with $v.items }}
            items:
              {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with $v.defaultMode }}
            defaultMode: {{ . }}
            {{- end }}
        {{- end }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if and .Values.topologySpread.enabled .Values.topologySpread.constraints }}
      topologySpreadConstraints:
      {{- range .Values.topologySpread.constraints }}
        - maxSkew: {{ .maxSkew | default 1 }}
          topologyKey: {{ .topologyKey | quote }}
          whenUnsatisfiable: {{ .whenUnsatisfiable | default "DoNotSchedule" | quote }}
          {{- if hasKey . "minDomains" }}
          minDomains: {{ .minDomains }}
          {{- end }}
          labelSelector:
            matchLabels:
              {{- include "common-chart.selectorLabels" $ | nindent 14 }}
              track: canary
      {{- end }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
