{{- if and .Values.canary.enabled .Values.canary.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "common-chart.fullname" . }}{{ .Values.canary.service.nameSuffix }}
  labels:
    {{- include "common-chart.labels" . | nindent 4 }}
    rollout: canary
  {{- with .Values.canary.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.canary.service.port | default .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "common-chart.selectorLabels" . | nindent 4 }}
    track: canary
{{- end }}
