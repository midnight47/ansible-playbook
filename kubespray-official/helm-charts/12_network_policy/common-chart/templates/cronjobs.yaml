{{- if and .Values.cronjobs .Values.cronjobs.enabled }}
{{- $root := . }}
{{- range $i, $cj := .Values.cronjobs.items }}
  {{- $name := required (printf "cronjobs.items[%d].name is required" $i) $cj.name }}
  {{- $sched := required (printf "cronjobs.items[%d].schedule is required" $i) $cj.schedule }}
  {{- $job := required (printf "cronjobs.items[%d].job is required" $i) $cj.job }}
  {{- $img := required (printf "cronjobs.items[%d].job.image.repository is required" $i) (get $job.image "repository") }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-%s" (include "common-chart.fullname" $root) $name | trunc 63 | trimSuffix "-" }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "common-chart.labels" $root | nindent 4 }}
    cronjob.kubernetes.io/name: {{ $name | quote }}
  {{- $meta := get $cj "metadata" }}
  {{- if and $meta (kindIs "map" $meta) (get $meta "annotations") }}
  annotations:
    {{- toYaml (get $meta "annotations") | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ $sched | quote }}
  {{- with $cj.timeZone }}
  timeZone: {{ . | quote }}
  {{- end }}
  {{- with $cj.suspend }}
  suspend: {{ . }}
  {{- end }}
  {{- with $cj.concurrencyPolicy }}
  concurrencyPolicy: {{ . }}
  {{- end }}
  {{- with $cj.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ . }}
  {{- end }}
  {{- with $cj.successfulJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ . }}
  {{- end }}
  {{- with $cj.failedJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ . }}
  {{- end }}
  jobTemplate:
    spec:
      {{- with $job.backoffLimit }}
      backoffLimit: {{ . }}
      {{- end }}
      {{- with $job.activeDeadlineSeconds }}
      activeDeadlineSeconds: {{ . }}
      {{- end }}
      {{- with $job.ttlSecondsAfterFinished }}
      ttlSecondsAfterFinished: {{ . }}
      {{- end }}
      template:
        metadata:
          labels:
            {{- include "common-chart.labels" $root | nindent 12 }}
            cronjob.kubernetes.io/name: {{ $name | quote }}
          {{- with (get $job "podAnnotations") }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          serviceAccountName: {{ include "common-chart.serviceAccountName" $root }}
          {{- with $root.Values.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $root.Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: {{ default "OnFailure" $job.restartPolicy }}
          containers:
            - name: {{ $name | trunc 63 | trimSuffix "-" }}
              image: "{{ $img }}{{- if (get $job.image "tag") }}:{{ get $job.image "tag" }}{{- end }}"
              {{- with (get $job.image "pullPolicy") }}
              imagePullPolicy: {{ . }}
              {{- end }}
              {{- with $job.command }}
              command:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- with $job.args }}
              args:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- with $job.env }}
              env:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- with $job.envFrom }}
              envFrom:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- with ($job.resources | default $root.Values.resources) }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- with $job.volumeMounts }}
              volumeMounts:
                {{- toYaml . | nindent 16 }}
              {{- end }}
          {{- with $job.volumes }}
          volumes:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with ($job.nodeSelector | default $root.Values.nodeSelector) }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with ($job.tolerations | default $root.Values.tolerations) }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with ($job.affinity | default $root.Values.affinity) }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
{{- end }}
{{- end }}
