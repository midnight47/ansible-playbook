{{- /*
Режимы:
- blueGreen.enabled == true  -> два Deployment'а: <fullname>-blue и <fullname>-green, selector/labels с color.
  * Реплики и образы можно переопределять по цветам.
  * initContainers/sidecars: берём глобальные + добавочные цветовые.
- Иначе -> стандартный одиночный Deployment (как у тебя был).
*/ -}}

{{- if and .Values.blueGreen .Values.blueGreen.enabled }}

{{- $root := . -}}
{{- $colors := list "blue" "green" -}}

{{- range $idx, $color := $colors }}
{{- $name := printf "%s-%s" (include "common-chart.fullname" $root) $color -}}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "common-chart.labels" $root | nindent 4 }}
    color: {{ $color }}
spec:
  {{- if not $root.Values.autoscaling.enabled }}
  replicas: {{ default $root.Values.replicaCount (get $root.Values.blueGreen.replicas $color) }}
  {{- end }}

  # --- RollingUpdate strategy + параметры выката ---
  {{- if $root.Values.updateStrategy.enabled }}
  strategy:
    type: {{ $root.Values.updateStrategy.type | default "RollingUpdate" }}
    {{- if ne ($root.Values.updateStrategy.type | default "RollingUpdate") "Recreate" }}
    rollingUpdate:
      maxSurge: {{ $root.Values.updateStrategy.rollingUpdate.maxSurge | default "25%" }}
      maxUnavailable: {{ $root.Values.updateStrategy.rollingUpdate.maxUnavailable | default 0 }}
    {{- end }}
  minReadySeconds: {{ $root.Values.updateStrategy.minReadySeconds | default 0 }}
  revisionHistoryLimit: {{ $root.Values.updateStrategy.revisionHistoryLimit | default 10 }}
  progressDeadlineSeconds: {{ $root.Values.updateStrategy.progressDeadlineSeconds | default 600 }}
  {{- end }}
  # --- /RollingUpdate ---

  selector:
    matchLabels:
      {{- include "common-chart.selectorLabels" $root | nindent 6 }}
      color: {{ $color }}
  template:
    metadata:
      # Аннотация reloader добавляется автоматически, если включён vault_secret и указано имя секрета
      annotations:
        {{- if and $root.Values.vault_secret.enabled $root.Values.vault_secret.name }}
        secret.reloader.stakater.com/reload: "{{ $root.Values.vault_secret.name }}"
        {{- end }}
        {{- with $root.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "common-chart.labels" $root | nindent 8 }}
        color: {{ $color }}
        {{- with $root.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "common-chart.serviceAccountName" $root }}

      {{- if $root.Values.podSecurityContext }}
      securityContext:
        {{- toYaml $root.Values.podSecurityContext | nindent 8 }}
      {{- else }}
      securityContext: {}
      {{- end }}

      {{/* Настройки подключения секрета: безопасные дефолты */}}
      {{- $attach := default (dict) $root.Values.vault_secret.attach }}
      {{- $asEnv := default true  (get $attach "asEnv") }}
      {{- $asVol := default false (get $attach "asVolume") }}
      {{- $mountPath := default "/etc/app/secret" (get $attach "mountPath") }}

      {{- /* ===== INIT CONTAINERS ===== */}}
      {{- $globalInits := $root.Values.initContainers | default (list) -}}
      {{- $colorInits  := (get $root.Values.blueGreen.initContainers $color) | default (list) -}}
      {{- $inits := concat $globalInits $colorInits -}}
      {{- with $inits }}
      initContainers:
        {{- range $i, $ic := . }}
        - name: {{ default (printf "%s-init-%d" $root.Chart.Name $i) $ic.name }}
          {{- with $ic.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $ic.image }}
          image: "{{ .repository }}{{- if .tag }}:{{ .tag }}{{- end }}"
          {{- if .pullPolicy }}
          imagePullPolicy: {{ .pullPolicy }}
          {{- end }}
          {{- end }}

          {{- with $ic.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $ic.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $ic.workingDir }}
          workingDir: {{ . | quote }}
          {{- end }}

          {{- with $ic.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $ic.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $ic.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $ic.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $ic.extraContainerSpec }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- /* ===== /INIT CONTAINERS ===== */}}

      containers:
        - name: {{ $root.Chart.Name }}
          securityContext:
            {{- toYaml $root.Values.securityContext | nindent 12 }}

          {{- /* Базовый образ + override по цвету */}}
          {{- $img := dict
                "repository" ($root.Values.image.repository)
                "tag"        (default $root.Chart.AppVersion $root.Values.image.tag)
                "pullPolicy" ($root.Values.image.pullPolicy | default "IfNotPresent") -}}
          {{- $ov := (get $root.Values.blueGreen.images $color) | default dict -}}
          {{- with $ov.repository }}{{ $_ := set $img "repository" . }}{{- end }}
          {{- with $ov.tag }}{{ $_ := set $img "tag" . }}{{- end }}
          {{- with $ov.pullPolicy }}{{ $_ := set $img "pullPolicy" . }}{{- end }}
          image: "{{ get $img "repository" }}:{{ get $img "tag" }}"
          imagePullPolicy: {{ get $img "pullPolicy" }}

          ports:
            - name: http
              containerPort: {{ $root.Values.service.port }}
              protocol: TCP

          {{- if and $root.Values.vault_secret.enabled $asEnv $root.Values.vault_secret.name }}
          envFrom:
            - secretRef:
                name: {{ $root.Values.vault_secret.name }}
          {{- end }}

          livenessProbe:
            {{- toYaml $root.Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml $root.Values.readinessProbe | nindent 12 }}
          {{- with $root.Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          resources:
            {{- toYaml $root.Values.resources | nindent 12 }}

          {{- $needSecretVol := and $root.Values.vault_secret.enabled $asVol $root.Values.vault_secret.name }}
          {{- if or $needSecretVol $root.Values.volumeMounts }}
          volumeMounts:
            {{- if $needSecretVol }}
            - name: vault-secret
              mountPath: {{ $mountPath }}
              readOnly: true
            {{- end }}
            {{- with $root.Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}

        {{- /* ===== САЙДКАРЫ: глобальные + цветовые ===== */}}
        {{- $globalSC := $root.Values.sidecars | default (list) -}}
        {{- $colorSC  := (get $root.Values.blueGreen.sidecars $color) | default (list) -}}
        {{- $allSC    := concat $globalSC $colorSC -}}
        {{- with $allSC }}
        {{- range $i, $sc := . }}
        - name: {{ default (printf "%s-sidecar-%d" $root.Chart.Name $i) $sc.name }}
          {{- with $sc.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $sc.image }}
          image: "{{ .repository }}{{- if .tag }}:{{ .tag }}{{- end }}"
          {{- if .pullPolicy }}
          imagePullPolicy: {{ .pullPolicy }}
          {{- end }}
          {{- end }}

          {{- with $sc.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $sc.workingDir }}
          workingDir: {{ . | quote }}
          {{- end }}

          {{- with $sc.ports }}
          ports:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $sc.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $sc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $sc.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $sc.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.terminationMessagePath }}
          terminationMessagePath: {{ . | quote }}
          {{- end }}
          {{- with $sc.terminationMessagePolicy }}
          terminationMessagePolicy: {{ . | quote }}
          {{- end }}

          {{- with $sc.extraContainerSpec }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- end }}
        {{- end }}
        {{- /* ===== /САЙДКАРЫ ===== */}}

      {{- /* ===== VOLUMES: secret + user volumes + configMapVolumes ===== */}}
      {{- $needSecretVol := and $root.Values.vault_secret.enabled $asVol $root.Values.vault_secret.name }}
      {{- $cmVols := $root.Values.configMapVolumes | default (list) }}
      {{- if or $needSecretVol (or $root.Values.volumes (gt (len $cmVols) 0)) }}
      volumes:
        {{- if $needSecretVol }}
        - name: vault-secret
          secret:
            secretName: {{ $root.Values.vault_secret.name }}
        {{- end }}

        {{- with $root.Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

        {{- /* volumes из включённых ConfigMaps по короткому имени */}}
        {{- range $v := $cmVols }}
        - name: {{ $v.volumeName | default (printf "cm-%s" $v.name) }}
          configMap:
            name: {{ printf "%s-%s" (include "common-chart.fullname" $root) $v.name }}
            {{- with $v.items }}
            items:
              {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with $v.defaultMode }}
            defaultMode: {{ . }}
            {{- end }}
        {{- end }}
      {{- end }}
      {{- /* ===== /VOLUMES ===== */}}

      {{- with $root.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if and $root.Values.topologySpread.enabled $root.Values.topologySpread.constraints }}
      topologySpreadConstraints:
      {{- range $root.Values.topologySpread.constraints }}
        - maxSkew: {{ .maxSkew | default 1 }}
          topologyKey: {{ .topologyKey | quote }}
          whenUnsatisfiable: {{ .whenUnsatisfiable | default "DoNotSchedule" | quote }}
          {{- if hasKey . "minDomains" }}
          minDomains: {{ .minDomains }}
          {{- end }}
          labelSelector:
            matchLabels:
              {{- include "common-chart.selectorLabels" $root | nindent 14 }}
              color: {{ $color }}
      {{- end }}
      {{- end }}

      {{- with $root.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
{{- end }} {{/* /range по цветам */}}

{{- else }}
# ====================== ОДИНОЧНЫЙ ДЕПЛОЙМЕНТ (как раньше) ======================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common-chart.fullname" . }}
  labels:
    {{- include "common-chart.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}

  # --- RollingUpdate strategy + параметры выката ---
  {{- if .Values.updateStrategy.enabled }}
  strategy:
    type: {{ .Values.updateStrategy.type | default "RollingUpdate" }}
    {{- if ne (.Values.updateStrategy.type | default "RollingUpdate") "Recreate" }}
    rollingUpdate:
      maxSurge: {{ .Values.updateStrategy.rollingUpdate.maxSurge | default "25%" }}
      maxUnavailable: {{ .Values.updateStrategy.rollingUpdate.maxUnavailable | default 0 }}
    {{- end }}
  minReadySeconds: {{ .Values.updateStrategy.minReadySeconds | default 0 }}
  revisionHistoryLimit: {{ .Values.updateStrategy.revisionHistoryLimit | default 10 }}
  progressDeadlineSeconds: {{ .Values.updateStrategy.progressDeadlineSeconds | default 600 }}
  {{- end }}
  # --- /RollingUpdate ---

  selector:
    matchLabels:
      {{- include "common-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      # Аннотация reloader добавляется автоматически, если включён vault_secret и указан имя секрета
      annotations:
        {{- if and .Values.vault_secret.enabled .Values.vault_secret.name }}
        secret.reloader.stakater.com/reload: "{{ .Values.vault_secret.name }}"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "common-chart.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "common-chart.serviceAccountName" . }}

      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- else }}
      securityContext: {}
      {{- end }}

      {{/* Настройки подключения секрета: безопасные дефолты (без хомпинга '-') */}}
      {{ $attach := default (dict) .Values.vault_secret.attach }}
      {{ $asEnv := default true  (get $attach "asEnv") }}
      {{ $asVol := default false (get $attach "asVolume") }}
      {{ $mountPath := default "/etc/app/secret" (get $attach "mountPath") }}

      {{- /* ===== INIT CONTAINERS ===== */}}
      {{- with .Values.initContainers }}
      initContainers:
        {{- range $i, $ic := . }}
        - name: {{ default (printf "%s-init-%d" $.Chart.Name $i) $ic.name }}
          {{- with $ic.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $ic.image }}
          image: "{{ .repository }}{{- if .tag }}:{{ .tag }}{{- end }}"
          {{- if .pullPolicy }}
          imagePullPolicy: {{ .pullPolicy }}
          {{- end }}
          {{- end }}

          {{- with $ic.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $ic.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $ic.workingDir }}
          workingDir: {{ . | quote }}
          {{- end }}

          {{- with $ic.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $ic.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $ic.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $ic.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $ic.extraContainerSpec }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- /* ===== /INIT CONTAINERS ===== */}}

      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          {{- if and .Values.vault_secret.enabled $asEnv .Values.vault_secret.name }}
          envFrom:
            - secretRef:
                name: {{ .Values.vault_secret.name }}
          {{- end }}

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          {{- $needSecretVol := and .Values.vault_secret.enabled $asVol .Values.vault_secret.name }}
          {{- if or $needSecretVol .Values.volumeMounts }}
          volumeMounts:
            {{- if $needSecretVol }}
            - name: vault-secret
              mountPath: {{ $mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}

        {{- /* ===== САЙДКАРЫ: несколько контейнеров через range ===== */}}
        {{- with .Values.sidecars }}
        {{- range $i, $sc := . }}
        - name: {{ default (printf "%s-sidecar-%d" $.Chart.Name $i) $sc.name }}
          {{- with $sc.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $sc.image }}
          image: "{{ .repository }}{{- if .tag }}:{{ .tag }}{{- end }}"
          {{- if .pullPolicy }}
          imagePullPolicy: {{ .pullPolicy }}
          {{- end }}
          {{- end }}

          {{- with $sc.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $sc.workingDir }}
          workingDir: {{ . | quote }}
          {{- end }}

          {{- with $sc.ports }}
          ports:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $sc.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $sc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $sc.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with $sc.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $sc.terminationMessagePath }}
          terminationMessagePath: {{ . | quote }}
          {{- end }}
          {{- with $sc.terminationMessagePolicy }}
          terminationMessagePolicy: {{ . | quote }}
          {{- end }}

          {{- with $sc.extraContainerSpec }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- end }}
        {{- end }}
        {{- /* ===== /САЙДКАРЫ ===== */}}

      {{- /* ===== VOLUMES: secret + user volumes + configMapVolumes ===== */}}
      {{- $needSecretVol := and .Values.vault_secret.enabled $asVol .Values.vault_secret.name }}
      {{- $cmVols := .Values.configMapVolumes | default (list) }}
      {{- if or $needSecretVol (or .Values.volumes (gt (len $cmVols) 0)) }}
      volumes:
        {{- if $needSecretVol }}
        - name: vault-secret
          secret:
            secretName: {{ .Values.vault_secret.name }}
        {{- end }}

        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

        {{- /* volumes из включённых ConfigMaps по короткому имени */}}
        {{- range $v := $cmVols }}
        - name: {{ $v.volumeName | default (printf "cm-%s" $v.name) }}
          configMap:
            name: {{ printf "%s-%s" (include "common-chart.fullname" $) $v.name }}
            {{- with $v.items }}
            items:
              {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with $v.defaultMode }}
            defaultMode: {{ . }}
            {{- end }}
        {{- end }}
      {{- end }}
      {{- /* ===== /VOLUMES ===== */}}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if and .Values.topologySpread.enabled .Values.topologySpread.constraints }}
      topologySpreadConstraints:
      {{- range .Values.topologySpread.constraints }}
        - maxSkew: {{ .maxSkew | default 1 }}
          topologyKey: {{ .topologyKey | quote }}
          whenUnsatisfiable: {{ .whenUnsatisfiable | default "DoNotSchedule" | quote }}
          {{- if hasKey . "minDomains" }}
          minDomains: {{ .minDomains }}
          {{- end }}
          labelSelector:
            matchLabels:
              {{- include "common-chart.selectorLabels" $ | nindent 14 }}
      {{- end }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
