{{- if .Values.pvc.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "common-chart.fullname" . }}-app-data
  labels:
    {{- include "common-chart.labels" . | nindent 4 }}
spec:
  accessModes: 
    - {{ .Values.pvc.accessMode | default "ReadWriteMany" }}
  storageClassName: {{ .Values.pvc.storageClassName | default "nfs-client" | quote }}
  resources:
    requests:
      storage: {{ .Values.pvc.size | default "1Gi" }}
{{- end }}

