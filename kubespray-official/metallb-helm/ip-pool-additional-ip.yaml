apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: first-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.191/32
    - 192.168.1.192/32   # Additional IP address added for the istio-ingressgateway service
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: first-l2-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
    - first-pool
