- name: install PGDG repository  on RedHat/CentOS
  yum:
    name: https://download.postgresql.org/pub/repos/yum/pgdg-redhat-repo-latest.noarch.rpm
    state: present
  when: ansible_os_family == 'RedHat'

- name: Install PostgreSQL {{ postgresql_major_version }} and dependencies on RedHat/CentOS"
  yum:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
    - "postgresql{{ postgresql_major_version }}"
    - "postgresql{{ postgresql_major_version }}-contrib"
    - "postgresql{{ postgresql_major_version }}-server"
    - python-psycopg2
    - "repmgr{{ postgresql_major_version }}"
  when: ansible_os_family == 'RedHat'

- name: Stop and disable default PostgreSQL on RedHat/CentOS
  systemd:
    name: postgresql-{{ postgresql_major_version }}
    state: stopped
    enabled: no
    masked: yes # чтобы PostgreSQL гарантированно не запустился сам
  when: ansible_os_family == "RedHat"

########################################################## debian ##########################################################

- name: Install repository prerequisites on Debian/Ubuntu
  apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
    update_cache: yes
  when: ansible_os_family == 'Debian'

- name: Add PostgreSQL apt repository key  on Debian/Ubuntu
  apt_key:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present
  when: ansible_os_family == 'Debian'

- name: Add PostgreSQL apt repository  on Debian/Ubuntu
  apt_repository:
    repo: "deb https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: "pgdg"
  when: ansible_os_family == 'Debian'

- name: Update apt cache after adding PGDG repository  on Debian/Ubuntu
  apt:
    update_cache: yes
  when: ansible_os_family == 'Debian'

- name: Install PostgreSQL {{ postgresql_major_version }} on Debian/Ubuntu
  apt:
    name:
      - "postgresql-{{ postgresql_major_version }}"
      - "postgresql-client-{{ postgresql_major_version }}"
      - postgresql-contrib
      - python3-psycopg2
    state: present
  when: ansible_os_family == 'Debian'

- name: Stop and disable default PostgreSQL (Debian/Ubuntu)
  systemd:
    name: postgresql
    state: stopped
    enabled: no
    masked: yes  # чтобы PostgreSQL гарантированно не запустился сам
  when: ansible_os_family == "Debian"
